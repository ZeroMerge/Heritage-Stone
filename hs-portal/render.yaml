services:
  - type: web
    name: hs-portal
    env: node
    rootDir: hs-portal
    plan: free # Force the free tier
    buildCommand: ./render-build.sh
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: HUB_ORIGIN
        value: https://heritagehub.ravennorthstudio.com
      - key: STUDIO_ORIGIN
        value: https://heritagestone.ravennorthstudio.com
      - key: PORTAL_BASE_DOMAIN
        value: hub.ravennorthstudio.com
